<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cardo｜驗證您的信箱</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Noto+Serif+TC:wght@300;400;500&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
   CARDO 全域設計系統
   深藍黑大理石 · 金色塔羅 · 藍綠星雲
═══════════════════════════════════════════ */
:root {
  --gold:        #e8b84b;
  --gold-bright: #f5d07a;
  --gold-dim:    #a07828;
  --gold-glow:   rgba(232,184,75,0.4);
  --teal:        #00c8be;
  --teal-glow:   rgba(0,180,170,0.35);
  --bg-card:     rgba(6,14,30,0.82);
  --text-cream:  #f0e6cc;
  --text-gold:   #d4a840;
  --text-muted:  rgba(180,160,110,0.5);
  --font-display:'Cinzel Decorative',serif;
  --font-title:  'Cinzel',serif;
  --font-body:   'Noto Serif TC',serif;
  --font-em:     'IM Fell English',serif;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;overflow-x:hidden;font-family:var(--font-body);}

/* ── 背景 Canvas ── */
#bgCanvas{position:fixed;inset:0;z-index:0;width:100%;height:100%;}

/* ── 星雲光暈層 ── */
.nebula-layer{position:fixed;inset:0;z-index:1;pointer-events:none;}
.nb{position:absolute;border-radius:50%;filter:blur(70px);}
.nb1{width:70%;height:60%;top:-10%;right:-15%;
  background:radial-gradient(ellipse,rgba(0,100,140,0.22) 0%,rgba(0,60,100,0.1) 45%,transparent 70%);}
.nb2{width:60%;height:55%;bottom:-10%;left:-10%;
  background:radial-gradient(ellipse,rgba(50,0,120,0.2) 0%,rgba(20,0,80,0.08) 45%,transparent 70%);}
.nb3{width:40%;height:40%;top:35%;left:30%;
  background:radial-gradient(ellipse,rgba(0,140,160,0.1) 0%,transparent 70%);}

/* ── 星塵 Canvas ── */
#starCanvas{position:fixed;inset:0;z-index:2;pointer-events:none;width:100%;height:100%;}

/* ── 頁面 ── */
.page{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 20px 48px;
}

/* ── Logo ── */
.logo-wrap{text-align:center;margin-bottom:32px;animation:fadeDown .9s ease both;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-24px);}to{opacity:1;transform:translateY(0);}}

.eclipse{width:96px;height:96px;margin:0 auto 18px;position:relative;display:flex;align-items:center;justify-content:center;}
.eclipse-ring{
  position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(rgba(200,160,50,0.8) 0deg,rgba(200,160,50,0.2) 90deg,rgba(200,160,50,0.6) 180deg,rgba(200,160,50,0.15) 270deg,rgba(200,160,50,0.8) 360deg);
  padding:2px;
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 2px),#fff calc(100% - 2px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 2px),#fff calc(100% - 2px));
  animation:ring-spin 12s linear infinite;
  filter:drop-shadow(0 0 8px rgba(200,160,50,0.7));
}
@keyframes ring-spin{to{transform:rotate(360deg);}}
.eclipse-inner{
  width:84px;height:84px;border-radius:50%;
  background:radial-gradient(circle at 38% 38%,#0d1f3a 0%,#060d1c 55%,#030810 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 0 24px rgba(0,0,0,.9),0 0 30px rgba(0,80,120,.3),0 0 60px rgba(200,160,50,.15);
  overflow:hidden;position:relative;
}
.eclipse-inner::after{
  content:'';position:absolute;top:-20px;right:-15px;width:55px;height:55px;
  background:radial-gradient(circle,rgba(0,160,180,0.25),transparent 70%);border-radius:50%;
}
.eclipse-star{
  font-size:30px;color:var(--gold-bright);position:relative;z-index:1;
  text-shadow:0 0 16px var(--gold),0 0 36px rgba(200,160,50,.6),0 0 60px rgba(0,180,200,.3);
  animation:star-pulse 3s ease-in-out infinite;
}
@keyframes star-pulse{
  0%,100%{text-shadow:0 0 16px var(--gold),0 0 36px rgba(200,160,50,.6);}
  50%{text-shadow:0 0 24px var(--gold-bright),0 0 50px rgba(200,160,50,.9),0 0 80px rgba(0,200,220,.4);}
}
.logo-name{
  font-family:var(--font-display);font-size:38px;font-weight:400;color:var(--text-cream);
  letter-spacing:.22em;text-shadow:0 0 40px rgba(200,160,50,.45),0 2px 8px rgba(0,0,0,.7);margin-bottom:10px;
}
.logo-tagline{font-family:var(--font-title);font-size:10px;letter-spacing:.35em;color:rgba(180,150,80,.55);text-transform:uppercase;}

/* ── 卡片 ── */
.card{width:100%;max-width:420px;position:relative;border-radius:22px;overflow:hidden;animation:fadeUp .9s ease .25s both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

.card-nebula{
  position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 80% 20%,rgba(0,130,160,0.18) 0%,transparent 60%),
    radial-gradient(ellipse 60% 60% at 10% 80%,rgba(40,0,100,0.15) 0%,transparent 55%),
    linear-gradient(160deg,rgba(6,14,30,0.9) 0%,rgba(4,10,22,0.95) 100%);
}
.card-border{
  position:absolute;inset:0;z-index:1;pointer-events:none;border-radius:22px;
  border:1px solid rgba(200,160,50,0.35);
  box-shadow:0 0 0 1px rgba(200,160,50,.07),inset 0 1px 0 rgba(255,220,100,.12),0 30px 80px rgba(0,0,0,.7),0 0 60px rgba(0,0,0,.5);
}
.card-glow{
  position:absolute;inset:0;z-index:1;pointer-events:none;border-radius:22px;
  box-shadow:inset 0 0 40px rgba(0,80,100,.12),inset 0 0 1px rgba(200,160,50,.2);
}

/* 細線角落 */
.corner-line{position:absolute;z-index:3;width:18px;height:18px;border-color:rgba(200,160,50,.35);border-style:solid;}
.cl-tl{top:8px;left:8px;border-width:1px 0 0 1px;border-radius:5px 0 0 0;}
.cl-tr{top:8px;right:8px;border-width:1px 1px 0 0;border-radius:0 5px 0 0;}
.cl-bl{bottom:8px;left:8px;border-width:0 0 1px 1px;border-radius:0 0 0 5px;}
.cl-br{bottom:8px;right:8px;border-width:0 1px 1px 0;border-radius:0 0 5px 0;}

/* 卡片內容 */
.card-inner{position:relative;z-index:2;padding:36px 30px 32px;}

/* ── 頂部裝飾 ── */
.card-header-deco{text-align:center;margin-bottom:24px;}
.deco-moon-top{font-size:18px;color:var(--gold);text-shadow:0 0 12px var(--gold-glow);display:block;margin-bottom:4px;}
.deco-line{display:flex;align-items:center;gap:8px;}
.deco-line-seg{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,160,50,.4),transparent);}
.deco-star-mid{font-size:10px;letter-spacing:6px;color:var(--gold-dim);}

/* ── 狀態圖示區 ── */
.status-area{text-align:center;padding:12px 0 28px;}

/* 信封動畫 */
.envelope-wrap{
  width:80px;height:80px;margin:0 auto 20px;
  position:relative;display:flex;align-items:center;justify-content:center;
}
.envelope-ring{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(200,160,50,0.3);
  box-shadow:0 0 20px rgba(200,160,50,0.15),inset 0 0 20px rgba(0,80,120,0.2);
  animation:pulse-ring 2.5s ease-in-out infinite;
}
@keyframes pulse-ring{
  0%,100%{box-shadow:0 0 20px rgba(200,160,50,0.15),inset 0 0 20px rgba(0,80,120,0.2);}
  50%{box-shadow:0 0 35px rgba(200,160,50,0.35),inset 0 0 30px rgba(0,120,160,0.3);}
}
.envelope-icon{
  font-size:34px;
  filter:drop-shadow(0 0 10px rgba(200,160,50,0.6));
  animation:float-icon 3s ease-in-out infinite;
  position:relative;z-index:1;
}
@keyframes float-icon{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
}

/* 成功圖示 */
.success-wrap{
  width:80px;height:80px;margin:0 auto 20px;
  position:relative;display:flex;align-items:center;justify-content:center;
  display:none;
}
.success-ring{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(0,200,160,0.4);
  box-shadow:0 0 25px rgba(0,200,160,0.2),inset 0 0 20px rgba(0,100,120,0.2);
  animation:success-pulse 2s ease-in-out infinite;
}
@keyframes success-pulse{
  0%,100%{box-shadow:0 0 25px rgba(0,200,160,0.2);}
  50%{box-shadow:0 0 45px rgba(0,200,160,0.45);}
}
.success-icon{
  font-size:36px;position:relative;z-index:1;
  animation:pop-in .5s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
@keyframes pop-in{from{opacity:0;transform:scale(0.3);}to{opacity:1;transform:scale(1);}}

/* 錯誤圖示 */
.error-wrap{
  width:80px;height:80px;margin:0 auto 20px;
  position:relative;display:flex;align-items:center;justify-content:center;
  display:none;
}
.error-ring{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(200,40,70,0.4);
  box-shadow:0 0 25px rgba(200,40,70,0.2);
}
.error-icon{font-size:36px;position:relative;z-index:1;}

/* 標題 */
.status-title{
  font-family:var(--font-title);font-size:18px;letter-spacing:.18em;
  color:var(--text-cream);text-transform:uppercase;margin-bottom:10px;
  text-shadow:0 0 20px rgba(200,160,50,.3);
}
.status-subtitle{
  font-family:var(--font-body);font-size:13.5px;
  color:rgba(200,175,120,0.65);line-height:1.75;
  letter-spacing:.03em;
}
.status-subtitle em{
  font-family:var(--font-em);font-style:italic;
  color:rgba(220,185,100,0.85);
}

/* ── 進度條 ── */
.progress-wrap{margin:20px 0;position:relative;}
.progress-track{
  height:2px;background:rgba(200,160,50,0.12);border-radius:2px;overflow:hidden;
}
.progress-bar{
  height:100%;width:0%;border-radius:2px;
  background:linear-gradient(90deg,var(--gold-dim),var(--gold),var(--gold-bright));
  box-shadow:0 0 8px var(--gold-glow);
  transition:width .4s ease;
  animation:scanning 2s ease-in-out infinite;
}
@keyframes scanning{
  0%{width:0%;margin-left:0%;}
  50%{width:60%;margin-left:20%;}
  100%{width:0%;margin-left:100%;}
}
.progress-bar.done{animation:none;width:100%;}

/* ── 分隔線 ── */
.divider{
  display:flex;align-items:center;gap:10px;margin:22px 0 20px;
}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,160,50,.2),transparent);}
.divider-text{font-family:var(--font-title);font-size:8px;letter-spacing:.3em;color:var(--text-muted);}

/* ── 動作按鈕 ── */
.btn{
  width:100%;padding:13px;border-radius:11px;border:none;cursor:pointer;
  font-family:var(--font-title);font-size:11px;letter-spacing:.25em;text-transform:uppercase;
  transition:all .3s;margin-bottom:10px;
}
.btn-primary{
  background:linear-gradient(135deg,rgba(140,100,30,.6),rgba(200,160,50,.4),rgba(120,85,25,.6));
  border:1px solid rgba(200,160,50,.45);
  color:var(--gold-bright);
  text-shadow:0 0 10px rgba(200,160,50,.5);
  box-shadow:0 0 20px rgba(200,160,50,.1),inset 0 1px 0 rgba(255,220,100,.12);
}
.btn-primary:hover{
  background:linear-gradient(135deg,rgba(160,115,35,.7),rgba(220,175,60,.5),rgba(140,100,30,.7));
  box-shadow:0 0 30px rgba(200,160,50,.2),inset 0 1px 0 rgba(255,220,100,.2);
  transform:translateY(-1px);
}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-ghost{
  background:transparent;
  border:1px solid rgba(200,160,50,.18);
  color:rgba(180,145,80,.55);
}
.btn-ghost:hover{
  border-color:rgba(200,160,50,.35);
  color:rgba(200,165,90,.75);
  background:rgba(200,160,50,.04);
}

/* ── 重送倒數 ── */
.resend-wrap{text-align:center;margin-top:4px;}
.resend-text{
  font-family:var(--font-body);font-size:12px;color:var(--text-muted);
  letter-spacing:.04em;
}
.resend-link{
  color:var(--gold-dim);cursor:pointer;text-decoration:underline;
  text-decoration-color:rgba(160,120,40,.3);transition:color .2s;
}
.resend-link:hover{color:var(--gold);}
.resend-link.disabled{opacity:.4;cursor:not-allowed;pointer-events:none;}
#countdown{color:rgba(200,160,50,.6);font-family:var(--font-title);font-size:11px;}

/* ── 訊息 ── */
.msg{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
.msg.err{display:block;background:rgba(140,15,40,.3);border:1px solid rgba(200,40,70,.35);color:#ffaabb;}
.msg.ok{display:block;background:rgba(0,100,80,.3);border:1px solid rgba(0,170,130,.35);color:#90ffdd;}

/* ── 月相裝飾 ── */
.moon-deco{
  text-align:center;margin-top:20px;
  font-family:var(--font-title);font-size:9px;letter-spacing:.4em;
  color:rgba(160,130,60,.3);text-transform:uppercase;
}
.moon-phases{font-size:14px;letter-spacing:4px;opacity:.35;display:block;margin-bottom:4px;}

/* ── state 控制 ── */
.state-checking .s-pending{display:block;}
.state-checking .s-success{display:none;}
.state-checking .s-error{display:none;}

.state-success .s-pending{display:none;}
.state-success .s-success{display:block;}
.state-success .s-error{display:none;}

.state-error .s-pending{display:none;}
.state-error .s-success{display:none;}
.state-error .s-error{display:block;}

/* waiting（無 token，提示檢查信箱）*/
.state-waiting .s-pending{display:block;}
.state-waiting .s-success{display:none;}
.state-waiting .s-error{display:none;}
.state-waiting .progress-wrap{display:none;}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="nebula-layer">
  <div class="nb nb1"></div>
  <div class="nb nb2"></div>
  <div class="nb nb3"></div>
</div>
<canvas id="starCanvas"></canvas>

<div class="page">
  <div class="logo-wrap">
    <div class="eclipse">
      <div class="eclipse-ring"></div>
      <div class="eclipse-inner">
        <span class="eclipse-star">✦</span>
      </div>
    </div>
    <div class="logo-name">Cardo</div>
    <div class="logo-tagline">Where Souls Align</div>
  </div>

  <!-- 驗證卡片 -->
  <div class="card" id="verifyCard">
    <div class="card-nebula"></div>
    <div class="card-border"></div>
    <div class="card-glow"></div>
    <div class="corner-line cl-tl"></div>
    <div class="corner-line cl-tr"></div>
    <div class="corner-line cl-bl"></div>
    <div class="corner-line cl-br"></div>

    <div class="card-inner">
      <!-- 頂部裝飾 -->
      <div class="card-header-deco">
        <span class="deco-moon-top">☽ ✦ ☾</span>
        <div class="deco-line">
          <span class="deco-line-seg"></span>
          <span class="deco-star-mid">✦ ✦ ✦</span>
          <span class="deco-line-seg"></span>
        </div>
      </div>

      <!-- 訊息 -->
      <div class="msg" id="msg"></div>

      <!-- 狀態區（統一容器，用 class 切換） -->
      <div class="status-area" id="statusArea">

        <!-- PENDING / WAITING 狀態 -->
        <div class="s-pending">
          <div class="envelope-wrap">
            <div class="envelope-ring"></div>
            <div class="envelope-icon">✉️</div>
          </div>
          <div class="status-title" id="pendingTitle">驗 證 中</div>
          <div class="status-subtitle" id="pendingSubtitle">
            正在與星河溝通，<br>請稍候片刻…
          </div>
          <div class="progress-wrap">
            <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
          </div>
        </div>

        <!-- SUCCESS 狀態 -->
        <div class="s-success" style="display:none;">
          <div class="success-wrap" style="display:flex;">
            <div class="success-ring"></div>
            <div class="success-icon">✨</div>
          </div>
          <div class="status-title">驗 證 成 功</div>
          <div class="status-subtitle">
            您的靈魂印記已確認。<br>
            <em>The stars have aligned for you.</em>
          </div>
        </div>

        <!-- ERROR 狀態 -->
        <div class="s-error" style="display:none;">
          <div class="error-wrap" style="display:flex;">
            <div class="error-ring"></div>
            <div class="error-icon">🌑</div>
          </div>
          <div class="status-title">驗 證 失 敗</div>
          <div class="status-subtitle" id="errorSubtitle">
            連結已失效或過期，<br>請重新申請驗證信。
          </div>
        </div>

      </div>

      <!-- 分隔線 -->
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">✦</span>
        <span class="divider-line"></span>
      </div>

      <!-- 動作按鈕 -->
      <div id="actionArea">
        <!-- SUCCESS 按鈕 -->
        <div class="s-success" style="display:none;">
          <button class="btn btn-primary" onclick="goToDashboard()">進 入 我 的 宇 宙</button>
        </div>
        <!-- ERROR / WAITING 按鈕 -->
        <div class="s-error">
          <button class="btn btn-primary" id="resendBtn" onclick="resendEmail()">重 新 寄 送 驗 證 信</button>
        </div>
        <div class="s-pending">
          <!-- waiting 狀態才顯示 -->
          <button class="btn btn-ghost s-waiting-only" id="resendWaitBtn" onclick="resendEmail()" style="display:none;">重 新 寄 送 驗 證 信</button>
        </div>
        <!-- 回首頁（共用） -->
        <button class="btn btn-ghost" onclick="goToIndex()">返 回 登 入</button>
      </div>

      <!-- 重送倒數 -->
      <div class="resend-wrap" id="resendWrap" style="display:none;">
        <span class="resend-text"><span id="countdown"></span> 秒後可再次發送</span>
      </div>

      <!-- 月相 -->
      <div class="moon-deco">
        <span class="moon-phases">🌑 🌒 🌓 🌔 🌕</span>
        <span>Cardo · Verification</span>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══ Supabase ═══════════════════════════════ */
const SUPABASE_URL = "https://eyocjqwagxzedeecsqjr.supabase.co"
const SUPABASE_KEY = "sb_publishable_N1zVyHCUj4W9DxnCkPpxAw_Xkfs8VXF"
const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

/* ═══ 大理石背景 Canvas ════════════════════════ */
;(function(){
  const c = document.getElementById('bgCanvas')
  const ctx = c.getContext('2d')
  function resize(){ c.width = window.innerWidth; c.height = window.innerHeight; draw() }
  function draw(){
    const w = c.width, h = c.height
    const base = ctx.createLinearGradient(0,0,w,h)
    base.addColorStop(0,'#03060f'); base.addColorStop(.3,'#050c1a')
    base.addColorStop(.6,'#040812'); base.addColorStop(1,'#02050d')
    ctx.fillStyle = base; ctx.fillRect(0,0,w,h)
    for(let i=0;i<14;i++){
      const x0 = Math.random()*w, y0 = Math.random()*h*.5
      const x1 = x0 + (Math.random()-.5)*w*.8, y1 = y0 + h*.5 + Math.random()*h*.5
      const a = .015 + Math.random()*.04
      const isBlue = Math.random() > .35
      const col = isBlue ? `rgba(20,60,120,${a})` : `rgba(10,30,70,${a})`
      const g = ctx.createLinearGradient(x0,y0,x1,y1)
      g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(.35,col)
      g.addColorStop(.65,col); g.addColorStop(1,'rgba(0,0,0,0)')
      ctx.beginPath(); ctx.moveTo(x0,y0)
      ctx.bezierCurveTo(
        x0 + (Math.random()-.5)*200, y0 + (y1-y0)*.33 + (Math.random()-.5)*100,
        x1 + (Math.random()-.5)*200, y0 + (y1-y0)*.66 + (Math.random()-.5)*100,
        x1, y1)
      ctx.strokeStyle = g; ctx.lineWidth = 1 + Math.random()*3.5; ctx.stroke()
    }
    for(let i=0;i<10;i++){
      const x0 = Math.random()*w, y0 = Math.random()*h
      const x1 = x0 + (Math.random()-.5)*w*.6, y1 = y0 + (Math.random()-.5)*h*.6
      const a = .008 + Math.random()*.022
      const g = ctx.createLinearGradient(x0,y0,x1,y1)
      g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(.5,`rgba(180,140,40,${a})`); g.addColorStop(1,'rgba(0,0,0,0)')
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1)
      ctx.strokeStyle = g; ctx.lineWidth = .5 + Math.random(); ctx.stroke()
    }
  }
  window.addEventListener('resize',resize); resize()
})()

/* ═══ 星塵粒子動畫 ════════════════════════════ */
;(function(){
  const c = document.getElementById('starCanvas')
  const ctx = c.getContext('2d')
  const stars = [], bright = []
  function resize(){ c.width = window.innerWidth; c.height = window.innerHeight }
  for(let i=0;i<300;i++){
    const gold = Math.random() > .58
    stars.push({
      x: Math.random(), y: Math.random(),
      r: gold ? (.8 + Math.random()*2.2) : (.4 + Math.random()*1.4),
      gold,
      alpha: .08 + Math.random()*.65,
      speed: .3 + Math.random()*2,
      phase: Math.random()*Math.PI*2,
      dx: (Math.random()-.5)*0.0009,
      dy: (Math.random()-.5)*0.0005
    })
  }
  for(let i=0;i<20;i++){
    bright.push({
      x: Math.random(), y: Math.random(),
      r: 1.5 + Math.random()*2,
      alpha: .45 + Math.random()*.45,
      phase: Math.random()*Math.PI*2,
      speed: .4 + Math.random()*1.2,
      dx: (Math.random()-.5)*0.0006,
      dy: (Math.random()-.5)*0.00025
    })
  }
  let t = 0
  function draw(){
    ctx.clearRect(0,0,c.width,c.height); t += .012
    stars.forEach(s => {
      s.x += s.dx; s.y += s.dy
      if(s.x > 1) s.x -= 1; if(s.x < 0) s.x += 1
      if(s.y > 1) s.y -= 1; if(s.y < 0) s.y += 1
      const a = s.alpha * (.4 + .6 * (.5 + .5 * Math.sin(t*s.speed + s.phase)))
      ctx.beginPath(); ctx.arc(s.x*c.width, s.y*c.height, s.r, 0, Math.PI*2)
      ctx.fillStyle = s.gold ? `rgba(240,200,80,${a})` : `rgba(210,225,255,${a})`
      ctx.fill()
    })
    bright.forEach(s => {
      s.x += s.dx; s.y += s.dy
      if(s.x > 1) s.x -= 1; if(s.x < 0) s.x += 1
      if(s.y > 1) s.y -= 1; if(s.y < 0) s.y += 1
      const tw = Math.sin(t*s.speed + s.phase)
      const a = s.alpha * (.5 + .5 * (.5 + .5 * tw))
      const x = s.x*c.width, y = s.y*c.height, len = s.r*5*(0.7 + 0.3*tw)
      ctx.beginPath(); ctx.arc(x,y,s.r,0,Math.PI*2)
      ctx.fillStyle = `rgba(240,200,80,${a})`; ctx.fill()
      ;[0,Math.PI/2,Math.PI,Math.PI*1.5,Math.PI/4,Math.PI*.75,Math.PI*1.25,Math.PI*1.75].forEach(rot => {
        ctx.save(); ctx.translate(x,y); ctx.rotate(rot)
        const g = ctx.createLinearGradient(0,0,len,0)
        g.addColorStop(0,`rgba(240,200,80,${a*.6})`); g.addColorStop(1,'rgba(240,200,80,0)')
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(len,0)
        ctx.strokeStyle = g; ctx.lineWidth = .7; ctx.stroke(); ctx.restore()
      })
    })
    requestAnimationFrame(draw)
  }
  window.addEventListener('resize',resize); resize(); draw()
})()

/* ═══ 狀態切換 ═════════════════════════════════ */
const area = document.getElementById('statusArea')
const actionArea = document.getElementById('actionArea')

function setState(state) {
  // 更新 statusArea class
  area.className = 'status-area state-' + state
  // 更新 actionArea 內的 s-* 顯示
  actionArea.querySelectorAll('.s-success').forEach(el => el.style.display = state === 'success' ? 'block' : 'none')
  actionArea.querySelectorAll('.s-error').forEach(el => el.style.display = state === 'error' ? 'block' : 'none')
  // waiting 狀態才顯示重寄按鈕
  const waitBtn = document.getElementById('resendWaitBtn')
  if(waitBtn) waitBtn.style.display = state === 'waiting' ? 'block' : 'none'
}

/* ═══ 重送冷卻計時器 ════════════════════════════ */
let countdownTimer = null
function startCooldown(seconds = 60) {
  let left = seconds
  const wrap = document.getElementById('resendWrap')
  const cd = document.getElementById('countdown')
  const btn1 = document.getElementById('resendBtn')
  const btn2 = document.getElementById('resendWaitBtn')
  wrap.style.display = 'block'
  if(btn1) btn1.disabled = true
  if(btn2) btn2.disabled = true
  cd.textContent = left
  clearInterval(countdownTimer)
  countdownTimer = setInterval(() => {
    left--
    cd.textContent = left
    if(left <= 0){
      clearInterval(countdownTimer)
      wrap.style.display = 'none'
      if(btn1) btn1.disabled = false
      if(btn2) btn2.disabled = false
    }
  }, 1000)
}

/* ═══ 重新寄送驗證信 ═══════════════════════════ */
async function resendEmail() {
  const { data: { session } } = await sb.auth.getSession()
  const email = session?.user?.email || prompt('請輸入您的 Email：')
  if(!email) return
  const redirectTo = `${window.location.origin}${window.location.pathname}`
  const { error } = await sb.auth.resend({ type: 'signup', email, options: { emailRedirectTo: redirectTo } })
  if(error){
    showMsg('寄送失敗：' + (error.message || '請稍後再試'), 'err')
  } else {
    showMsg('驗證信已重新寄出，請檢查您的信箱。', 'ok')
    startCooldown(60)
  }
}

/* ═══ 訊息 ═════════════════════════════════════ */
function showMsg(t, type='err'){
  const e = document.getElementById('msg')
  e.textContent = t; e.className = `msg ${type}`
}

/* ═══ 跳轉 ═════════════════════════════════════ */
function goToDashboard(){ window.location.href = 'dashboard.html' }
function goToIndex(){ window.location.href = 'index.html' }

/* ═══ 主流程：偵測 token ══════════════════════ */
;(async () => {
  const hash = window.location.hash
  const params = new URLSearchParams(hash.replace('#',''))
  const accessToken  = params.get('access_token')
  const refreshToken = params.get('refresh_token')
  const type         = params.get('type')    // 'signup' | 'recovery' | etc.
  const errorDesc    = params.get('error_description')

  // URL 帶有錯誤（Supabase 直接回傳 error）
  if(errorDesc){
    document.getElementById('errorSubtitle').textContent = decodeURIComponent(errorDesc)
    setState('error'); return
  }

  // 無 token：純提示狀態（用戶從信箱點擊前）
  if(!accessToken){
    document.getElementById('pendingTitle').textContent = '確認您的信箱'
    document.getElementById('pendingSubtitle').innerHTML =
      '驗證信已寄出，<br>請前往信箱點擊連結完成驗證。'
    document.getElementById('resendWaitBtn').style.display = 'block'
    setState('waiting'); return
  }

  // 有 token：嘗試設定 session
  setState('checking')
  const { data, error } = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' })

  if(error || !data?.session){
    document.getElementById('errorSubtitle').innerHTML =
      (error?.message || '驗證連結已失效，') + '<br>請重新申請驗證信。'
    setState('error'); return
  }

  // 驗證成功
  document.getElementById('progressBar').classList.add('done')
  setTimeout(() => setState('success'), 600)
  // 3 秒後自動跳轉
  setTimeout(goToDashboard, 3600)
})()
</script>
